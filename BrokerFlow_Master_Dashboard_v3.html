<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BrokerFlow — Master Dashboard v3</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
  :root { --bg:#0b1020; --panel:#121937; --ink:#e7ecff; --muted:#8a94c2; --accent:#6ee7b7; --accent2:#818cf8; --warn:#fbbf24; --danger:#f87171; }
  html,body,#root { height:100%; }
  body { background:var(--bg); color:var(--ink); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; }
  .panel { background:var(--panel); border:1px solid #22306a; border-radius:14px; }
  .chip { padding:2px 8px; border-radius:999px; font-size:11px; background:#1c2551; color:#c4ccf7; }
  .chip-warn { background:#3a2f0d; color:#fcd34d; }
  .chip-ok { background:#10361f; color:#86efac; }
  .chip-bad { background:#3a1212; color:#fca5a5; }
  .btn { padding:8px 14px; border-radius:10px; background:#1c2551; color:#e7ecff; border:1px solid #2a3576; font-weight:500; }
  .btn:hover { background:#263180; }
  .btn-primary { background:linear-gradient(135deg,#6ee7b7,#818cf8); color:#0b1020; border:none; }
  .btn-danger { background:#3a1212; color:#fca5a5; border-color:#6b1d1d; }
  .inp { width:100%; padding:8px 10px; border-radius:10px; background:#0e1533; color:#e7ecff; border:1px solid #22306a; }
  .inp:focus { outline:none; border-color:#6ee7b7; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:#c4ccf7; cursor:pointer; }
  .nav-item:hover { background:#1c2551; }
  .nav-item.active { background:linear-gradient(90deg,#1c2551,#2a3576); color:#fff; border-left:3px solid #6ee7b7; }
  .kpi { font-size:28px; font-weight:700; }
  .kpi-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; padding:10px 12px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid #22306a; }
  td { padding:10px 12px; border-bottom:1px solid #1a2248; font-size:14px; }
  tr:hover td { background:#0e1533; }
  .badge { padding:3px 10px; border-radius:999px; font-size:11px; font-weight:500; }
  .stage-lead { background:#1c2551; color:#a5b4fc; }
  .stage-docs { background:#3a2f0d; color:#fcd34d; }
  .stage-done { background:#10361f; color:#86efac; }
  .stage-uw { background:#2a1a3a; color:#c4b5fd; }
  .stage-loi { background:#0f2a3a; color:#7dd3fc; }
  .stage-uc { background:#0f3a2a; color:#34d399; }
  .stage-closed { background:#064e3b; color:#a7f3d0; }
  .stage-dead { background:#1f1f1f; color:#9ca3af; }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:50; }
  .modal { background:var(--panel); border:1px solid #22306a; border-radius:14px; padding:20px; width:640px; max-height:85vh; overflow-y:auto; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid #6ee7b7; border-top-color:transparent; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .dropzone { border:2px dashed #2a3576; border-radius:12px; padding:40px; text-align:center; color:var(--muted); }
  .dropzone.drag { border-color:#6ee7b7; background:#0e1533; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;
const {
  ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  PieChart, Pie, Cell, LineChart, Line, AreaChart, Area
} = Recharts;

const API = ""; // same origin
const fmt$ = (v) => v == null ? "—" : "$" + Number(v).toLocaleString(undefined, {maximumFractionDigits:0});
const fmtPct = (v) => v == null ? "—" : Number(v).toFixed(2) + "%";
const fmtDate = (ms) => { if (!ms) return "—"; const d = new Date(Number(ms)); return d.toLocaleDateString(); };

const STAGE_CLASS = {
  "incoming leads": "stage-lead",
  "docs requested": "stage-docs",
  "docs complete": "stage-done",
  "underwriting": "stage-uw",
  "loi": "stage-loi",
  "under contract": "stage-uc",
  "closed": "stage-closed",
  "dead": "stage-dead",
};

// ---------- API client ----------
async function apiGet(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`GET ${path} → ${r.status}`);
  return r.json();
}
async function apiPost(path, body, isForm=false) {
  const opts = { method: "POST" };
  if (isForm) { opts.body = body; }
  else { opts.headers = {"content-type":"application/json"}; opts.body = JSON.stringify(body); }
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(`POST ${path} → ${r.status}`);
  return r.json();
}
async function apiPut(path, body) {
  const r = await fetch(API + path, { method: "PUT", headers: {"content-type":"application/json"}, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(`PUT ${path} → ${r.status}`);
  return r.json();
}
async function apiDel(path) {
  const r = await fetch(API + path, { method: "DELETE" });
  if (!r.ok) throw new Error(`DELETE ${path} → ${r.status}`);
  return r.json();
}

// ---------- Toast ----------
function useToast() {
  const [toast, setToast] = useState(null);
  const show = (msg, kind="info") => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 3500);
  };
  const ui = toast ? (
    <div className="fixed bottom-6 right-6 z-50 panel px-4 py-3 shadow-lg" style={{borderColor: toast.kind==='error'?'#6b1d1d':toast.kind==='ok'?'#164e3b':'#22306a'}}>
      <div className="text-sm">{toast.msg}</div>
    </div>
  ) : null;
  return { show, ui };
}

// ---------- Setup / connect screen ----------
function SetupScreen({ onReady }) {
  const [health, setHealth] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    apiGet("/api/health").then(h => { setHealth(h); setLoading(false); if (h.clickup_token_present) onReady(); })
      .catch(e => { setHealth({ ok:false, error:e.message }); setLoading(false); });
  }, []);
  if (loading) return <div className="flex items-center justify-center h-screen"><span className="spinner"></span></div>;
  if (!health?.ok) return (
    <div className="flex items-center justify-center h-screen">
      <div className="panel p-8 w-[480px]">
        <h2 className="text-2xl font-bold mb-2">Backend not reachable</h2>
        <p className="text-slate-400 mb-4">Start the server with <code className="bg-slate-800 px-2 py-1 rounded">python broker_flow.py</code> then refresh.</p>
        <pre className="bg-slate-900 p-3 rounded text-xs overflow-auto">{JSON.stringify(health, null, 2)}</pre>
      </div>
    </div>
  );
  if (!health.clickup_token_present) return (
    <div className="flex items-center justify-center h-screen">
      <div className="panel p-8 w-[560px]">
        <h2 className="text-2xl font-bold mb-2">Connect ClickUp</h2>
        <p className="text-slate-400 mb-4">Set <code className="bg-slate-800 px-2 py-1 rounded">CLICKUP_TOKEN</code> in the <code>.env</code> file next to <code>broker_flow.py</code>, then restart the server.</p>
        <div className="space-y-3 text-sm text-slate-300">
          <div>1. Go to ClickUp → Settings → Apps → Generate API Token (pk_xxx)</div>
          <div>2. Edit <code className="bg-slate-800 px-2 py-1 rounded">.env</code>: <code className="bg-slate-800 px-2 py-1 rounded">CLICKUP_TOKEN=pk_xxx</code></div>
          <div>3. Restart <code>broker_flow.py</code> and reload this page.</div>
        </div>
        <button className="btn btn-primary mt-6 w-full" onClick={() => window.location.reload()}>Reload</button>
      </div>
    </div>
  );
  return null;
}

// ---------- Layout shell ----------
function Shell({ children, view, setView, role, setRole, onRefresh, refreshing }) {
  const navItems = [
    ["dashboard", "Live Dashboard", "📊"],
    ["deals", "Deals", "🏢"],
    ["brokers", "Brokers", "🤝"],
    ["docchase", "Doc Chase", "📬"],
    ["intake", "AI Doc Intake", "🧠"],
    ["heatmap", "Pipeline Heatmap", "🔥"],
    ["graph", "Relationship Graph", "🕸️"],
    ["map", "Portfolio Map", "🗺️"],
    ["reports", "Reports", "📈"],
    ["underwriting", "Underwriting Queue", "📝"],
    ["admin", "Admin", "⚙️"],
  ];
  return (
    <div className="flex h-screen">
      <aside className="w-64 p-4 panel m-3 overflow-y-auto" style={{borderRadius:14}}>
        <div className="text-xl font-bold mb-1">BrokerFlow</div>
        <div className="text-xs text-slate-400 mb-4">Master Dashboard v3.0</div>
        <div className="mb-4">
          <div className="text-xs text-slate-400 mb-1">View as</div>
          <select className="inp text-sm" value={role} onChange={e => setRole(e.target.value)}>
            <option value="Director">Director</option>
            <option value="VP">VP</option>
            <option value="Analyst">Analyst</option>
            <option value="IC">IC</option>
          </select>
        </div>
        {navItems.map(([id, label, icon]) => (
          <div key={id} className={`nav-item ${view===id?'active':''}`} onClick={() => setView(id)}>
            <span>{icon}</span>
            <span className="text-sm">{label}</span>
          </div>
        ))}
        <button className="btn w-full mt-4 text-xs" onClick={onRefresh} disabled={refreshing}>
          {refreshing ? <span className="spinner"/> : "↻ Refresh from ClickUp"}
        </button>
      </aside>
      <main className="flex-1 p-6 overflow-y-auto">{children}</main>
    </div>
  );
}

// ---------- Views ----------

function DashboardView({ deals, brokers, followups, role }) {
  const active = deals.filter(d => !["closed","dead"].includes((d.status||"").toLowerCase()));
  const totalAUM = active.reduce((s,d) => s + (Number(d.ask_price)||0), 0);
  const docsOutstanding = active.filter(d => d.doc_status !== "Complete").length;
  const byStage = {};
  deals.forEach(d => { byStage[d.status||"unknown"] = (byStage[d.status||"unknown"]||0)+1; });
  const stageData = Object.entries(byStage).map(([k,v])=>({name:k,count:v}));

  const brief = {
    Director: `${active.length} active deals, ${fmt$(totalAUM)} total ask. ${docsOutstanding} deals awaiting docs. ${followups.filter(f=>f.state==='Queued').length} cadence follow-ups queued.`,
    VP: `Pipeline health: ${active.length} active, ${deals.filter(d=>d.status==='underwriting').length} in UW, ${deals.filter(d=>d.status==='loi').length} at LOI. ${docsOutstanding} need docs — chase today.`,
    Analyst: `${deals.filter(d=>d.status==='docs complete').length} deals ready for your underwriting. Recent activity: ${deals.slice(0,3).map(d=>d.name).join('; ')}`,
    IC: `${deals.filter(d=>d.status==='loi' || d.status==='under contract').length} deals at LOI or UC for committee review. Next meeting: pull briefs.`,
  };

  return (
    <div className="space-y-4">
      <div className="panel p-5">
        <div className="kpi-label">{role} brief</div>
        <div className="text-lg mt-1">{brief[role] || brief.Director}</div>
      </div>
      <div className="grid grid-cols-4 gap-4">
        <div className="panel p-5"><div className="kpi-label">Active deals</div><div className="kpi">{active.length}</div></div>
        <div className="panel p-5"><div className="kpi-label">Total ask</div><div className="kpi">{fmt$(totalAUM)}</div></div>
        <div className="panel p-5"><div className="kpi-label">Docs outstanding</div><div className="kpi" style={{color: docsOutstanding > 5 ? 'var(--warn)' : 'var(--ink)'}}>{docsOutstanding}</div></div>
        <div className="panel p-5"><div className="kpi-label">Brokers in CRM</div><div className="kpi">{brokers.length}</div></div>
      </div>
      <div className="grid grid-cols-2 gap-4">
        <div className="panel p-5">
          <div className="font-semibold mb-3">Pipeline by stage</div>
          <ResponsiveContainer width="100%" height={240}>
            <BarChart data={stageData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#22306a"/>
              <XAxis dataKey="name" stroke="#8a94c2" fontSize={10}/>
              <YAxis stroke="#8a94c2" fontSize={10}/>
              <Tooltip contentStyle={{background:'#121937',border:'1px solid #22306a',borderRadius:8}}/>
              <Bar dataKey="count" fill="#6ee7b7"/>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="panel p-5">
          <div className="font-semibold mb-3">Recent activity</div>
          <div className="space-y-2 text-sm">
            {deals.slice(0,6).map(d => (
              <div key={d.id} className="flex items-center justify-between py-1 border-b border-slate-800">
                <div className="flex items-center gap-2">
                  <span className={`badge ${STAGE_CLASS[d.status]||'stage-lead'}`}>{d.status}</span>
                  <span>{d.name}</span>
                </div>
                <span className="text-slate-500 text-xs">{fmtDate(d.date_updated)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function DealsView({ deals, brokers, stages, assetClasses, onCreate, onUpdate, onDelete, toast }) {
  const [filter, setFilter] = useState("");
  const [stageFilter, setStageFilter] = useState("");
  const [assetFilter, setAssetFilter] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);

  const filtered = deals.filter(d =>
    (!filter || d.name.toLowerCase().includes(filter.toLowerCase())) &&
    (!stageFilter || d.status === stageFilter) &&
    (!assetFilter || d.asset_class === assetFilter)
  );

  return (
    <div className="space-y-4">
      <div className="flex justify-between items-center">
        <div className="flex gap-2">
          <input className="inp w-64" placeholder="Search deals..." value={filter} onChange={e=>setFilter(e.target.value)}/>
          <select className="inp w-40" value={stageFilter} onChange={e=>setStageFilter(e.target.value)}>
            <option value="">All stages</option>
            {stages.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <select className="inp w-40" value={assetFilter} onChange={e=>setAssetFilter(e.target.value)}>
            <option value="">All asset classes</option>
            {assetClasses.map(a => <option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        <button className="btn btn-primary" onClick={() => { setEditing(null); setShowForm(true); }}>+ New deal</button>
      </div>
      <div className="panel p-0 overflow-hidden">
        <table>
          <thead><tr>
            <th>Deal</th><th>Stage</th><th>Asset</th><th>Location</th>
            <th>Ask</th><th>NOI</th><th>Cap</th><th>Docs</th><th>Next action</th><th></th>
          </tr></thead>
          <tbody>
            {filtered.map(d => {
              const broker = brokers.find(b => b.id === d.broker_id);
              return (
                <tr key={d.id}>
                  <td>
                    <div className="font-medium">{d.name}</div>
                    <div className="text-xs text-slate-500">{d.deal_id} · {broker?.name || 'No broker'}</div>
                  </td>
                  <td><span className={`badge ${STAGE_CLASS[d.status]||'stage-lead'}`}>{d.status}</span></td>
                  <td>{d.asset_class || '—'}</td>
                  <td className="text-xs">{d.city}{d.city && d.state?', ':''}{d.state}</td>
                  <td>{fmt$(d.ask_price)}</td>
                  <td>{fmt$(d.noi)}</td>
                  <td>{fmtPct(d.cap_rate)}</td>
                  <td>
                    <span className={`chip ${d.doc_status==='Complete'?'chip-ok':d.doc_status==='Partial'?'chip-warn':'chip-bad'}`}>
                      {d.doc_status || 'Requested'}
                    </span>
                  </td>
                  <td className="text-xs">
                    {d.next_action || '—'}
                    {d.next_action_date && <div className="text-slate-500">{d.next_action_date}</div>}
                  </td>
                  <td className="text-right">
                    <button className="btn text-xs mr-1" onClick={()=>{setEditing(d); setShowForm(true);}}>Edit</button>
                    <a className="btn text-xs" href={d.url} target="_blank" rel="noreferrer">↗</a>
                  </td>
                </tr>
              );
            })}
            {filtered.length === 0 && <tr><td colSpan="10" className="text-center text-slate-500 py-6">No deals match filter</td></tr>}
          </tbody>
        </table>
      </div>
      {showForm && <DealForm deal={editing} brokers={brokers} stages={stages} assetClasses={assetClasses}
        onClose={()=>setShowForm(false)}
        onSave={async (payload) => {
          try {
            if (editing) { await onUpdate(editing.id, payload); toast.show("Deal updated → synced to ClickUp", "ok"); }
            else { await onCreate(payload); toast.show("Deal created → written to ClickUp", "ok"); }
            setShowForm(false);
          } catch(e) { toast.show("Error: "+e.message, "error"); }
        }}
        onDelete={editing ? async () => {
          if (!confirm("Delete this deal in ClickUp?")) return;
          try { await onDelete(editing.id); toast.show("Deal deleted", "ok"); setShowForm(false); }
          catch(e) { toast.show("Error: "+e.message, "error"); }
        } : null}
      />}
    </div>
  );
}

function DealForm({ deal, brokers, stages, assetClasses, onClose, onSave, onDelete }) {
  const [form, setForm] = useState({
    deal_id: deal?.deal_id || "",
    name: deal?.name || "",
    status: deal?.status || "incoming leads",
    priority: deal?.priority || "normal",
    asset_class: deal?.asset_class || "MF",
    city: deal?.city || "",
    state: deal?.state || "",
    broker_id: deal?.broker_id || "",
    ask_price: deal?.ask_price || "",
    units: deal?.units || "",
    noi: deal?.noi || "",
    cap_rate: deal?.cap_rate || "",
    doc_status: deal?.doc_status || "Requested",
    docs_received: (deal?.docs_received || []).join(", "),
    docs_outstanding: (deal?.docs_outstanding || ["OM","T-12","T-3","Rent Roll","P&L"]).join(", "),
    next_action_date: deal?.next_action_date || "",
    next_action: deal?.next_action || "",
    source: deal?.source || "Broker",
    description_prose: deal?.description_prose || "",
  });
  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const submit = () => {
    const payload = {...form};
    payload.ask_price = payload.ask_price === "" ? null : Number(payload.ask_price);
    payload.units = payload.units === "" ? null : Number(payload.units);
    payload.noi = payload.noi === "" ? null : Number(payload.noi);
    payload.cap_rate = payload.cap_rate === "" ? null : Number(payload.cap_rate);
    payload.docs_received = payload.docs_received.split(",").map(s=>s.trim()).filter(Boolean);
    payload.docs_outstanding = payload.docs_outstanding.split(",").map(s=>s.trim()).filter(Boolean);
    if (!payload.name) payload.name = `${payload.deal_id || 'JPIG-???'} · ${payload.city}, ${payload.state}`;
    onSave(payload);
  };
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4">
          <h3 className="text-lg font-bold">{deal ? 'Edit deal' : 'New deal'}</h3>
          <button className="text-slate-500 text-xl" onClick={onClose}>×</button>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <div><div className="kpi-label">Deal ID</div><input className="inp" value={form.deal_id} onChange={e=>upd("deal_id",e.target.value)} placeholder="JPIG-004"/></div>
          <div><div className="kpi-label">Name (auto if blank)</div><input className="inp" value={form.name} onChange={e=>upd("name",e.target.value)}/></div>
          <div><div className="kpi-label">Stage</div>
            <select className="inp" value={form.status} onChange={e=>upd("status",e.target.value)}>
              {stages.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div><div className="kpi-label">Priority</div>
            <select className="inp" value={form.priority} onChange={e=>upd("priority",e.target.value)}>
              <option>low</option><option>normal</option><option>high</option><option>urgent</option>
            </select>
          </div>
          <div><div className="kpi-label">Asset class</div>
            <select className="inp" value={form.asset_class} onChange={e=>upd("asset_class",e.target.value)}>
              {assetClasses.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
          </div>
          <div><div className="kpi-label">Source</div>
            <select className="inp" value={form.source} onChange={e=>upd("source",e.target.value)}>
              <option>Broker</option><option>Off-market</option><option>Referral</option>
            </select>
          </div>
          <div><div className="kpi-label">City</div><input className="inp" value={form.city} onChange={e=>upd("city",e.target.value)}/></div>
          <div><div className="kpi-label">State</div><input className="inp" value={form.state} onChange={e=>upd("state",e.target.value)} maxLength={2}/></div>
          <div className="col-span-2"><div className="kpi-label">Broker</div>
            <select className="inp" value={form.broker_id} onChange={e=>upd("broker_id",e.target.value)}>
              <option value="">— none —</option>
              {brokers.map(b => <option key={b.id} value={b.id}>{b.name} ({b.firm})</option>)}
            </select>
          </div>
          <div><div className="kpi-label">Ask price</div><input className="inp" type="number" value={form.ask_price} onChange={e=>upd("ask_price",e.target.value)}/></div>
          <div><div className="kpi-label">Units / Keys</div><input className="inp" type="number" value={form.units} onChange={e=>upd("units",e.target.value)}/></div>
          <div><div className="kpi-label">NOI (T-12)</div><input className="inp" type="number" value={form.noi} onChange={e=>upd("noi",e.target.value)}/></div>
          <div><div className="kpi-label">Cap rate (%)</div><input className="inp" type="number" step="0.01" value={form.cap_rate} onChange={e=>upd("cap_rate",e.target.value)}/></div>
          <div><div className="kpi-label">Doc status</div>
            <select className="inp" value={form.doc_status} onChange={e=>upd("doc_status",e.target.value)}>

function IntakeView({ deals, onUpdate, toast }) {
  const [file, setFile] = useState(null);
  const [result, setResult] = useState(null);
  const [parsing, setParsing] = useState(false);
  const [applyTo, setApplyTo] = useState("");
  const fileRef = useRef(null);

  const parse = async () => {
    if (!file) return;
    setParsing(true);
    try {
      const fd = new FormData();
      fd.append("file", file);
      const r = await apiPost("/api/docs/parse", fd, true);
      setResult(r);
    } catch(e) { toast.show("Parse failed: "+e.message, "error"); }
    finally { setParsing(false); }
  };

  const applyToDeal = async () => {
    if (!applyTo || !result?.extracted) return;
    const deal = deals.find(d => d.id === applyTo);
    if (!deal) return;
    const patch = {};
    const e = result.extracted;
    if (e.noi != null) patch.noi = e.noi;
    if (e.units != null) patch.units = e.units;
    if (e.ask_price != null) patch.ask_price = e.ask_price;
    if (e.cap_rate != null) patch.cap_rate = e.cap_rate;
    // mark doc received
    const received = [...(deal.docs_received || []), "T-12 / P&L"];
    patch.docs_received = [...new Set(received)];
    patch.docs_outstanding = (deal.docs_outstanding || []).filter(d => !["T-12","T-3","P&L","T-12 / P&L"].includes(d));
    patch.doc_status = patch.docs_outstanding.length === 0 ? "Complete" : "Partial";
    try {
      await onUpdate(deal.id, patch);
      toast.show("Deal updated with extracted numbers", "ok");
      setResult(null); setFile(null); setApplyTo("");
    } catch(err) { toast.show("Error: "+err.message, "error"); }
  };

  return (
    <div className="space-y-4">
      <div className="panel p-4">
        <div className="font-semibold mb-1">AI Doc Intake</div>
        <div className="text-xs text-slate-400">Upload a T-12, P&L, or OM PDF. Extracts NOI, units, ask price, cap rate. Review and push to deal.</div>
      </div>
      <div className="panel p-6">
        <div className="dropzone" onClick={()=>fileRef.current?.click()}>
          <input ref={fileRef} type="file" accept=".pdf" className="hidden"
            onChange={e => setFile(e.target.files?.[0] || null)}/>
          {file ? <div>📄 {file.name}</div> : <div>Click to upload PDF</div>}
        </div>
        {file && !result && (
          <button className="btn btn-primary w-full mt-4" onClick={parse} disabled={parsing}>
            {parsing ? <><span className="spinner"/> Parsing…</> : "Parse document"}
          </button>
        )}
      </div>
      {result && (
        <div className="panel p-5 space-y-3">
          <div className="font-semibold">Extracted fields</div>
          <div className="grid grid-cols-2 gap-3 text-sm">
            <div><div className="kpi-label">NOI</div><div>{fmt$(result.extracted.noi)}</div></div>
            <div><div className="kpi-label">Gross income</div><div>{fmt$(result.extracted.gross_income)}</div></div>
            <div><div className="kpi-label">Total expenses</div><div>{fmt$(result.extracted.total_expenses)}</div></div>
            <div><div className="kpi-label">Units / keys</div><div>{result.extracted.units ?? '—'}</div></div>
            <div><div className="kpi-label">Ask price</div><div>{fmt$(result.extracted.ask_price)}</div></div>
            <div><div className="kpi-label">Cap rate</div><div>{fmtPct(result.extracted.cap_rate)}</div></div>
          </div>
          <div>
            <div className="kpi-label">Apply to deal</div>
            <select className="inp" value={applyTo} onChange={e=>setApplyTo(e.target.value)}>
              <option value="">— select deal —</option>
              {deals.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
            </select>
          </div>
          <div className="flex gap-2">
            <button className="btn" onClick={()=>{setResult(null);setFile(null);}}>Discard</button>
            <button className="btn btn-primary" disabled={!applyTo} onClick={applyToDeal}>Apply to deal</button>
          </div>
          <details><summary className="text-xs text-slate-500 cursor-pointer">Raw text preview ({result.char_count} chars)</summary>
            <pre className="text-xs bg-slate-900 p-3 rounded max-h-64 overflow-auto mt-2">{result.raw_text_preview}</pre>
          </details>
        </div>
      )}
    </div>
  );
}

function HeatmapView({ deals, stages, assetClasses }) {
  const matrix = {};
  assetClasses.forEach(a => { matrix[a] = {}; stages.forEach(s => matrix[a][s] = 0); });
  deals.forEach(d => {
    if (matrix[d.asset_class] && matrix[d.asset_class][d.status] != null) matrix[d.asset_class][d.status]++;
  });
  const max = Math.max(1, ...Object.values(matrix).flatMap(row => Object.values(row)));
  const cellStyle = (n) => {
    const pct = n/max;
    const bg = `rgba(110,231,183,${0.1 + pct*0.7})`;
    return { background: bg, color: pct > 0.4 ? '#0b1020' : '#e7ecff' };
  };
  return (
    <div className="panel p-5">
      <div className="font-semibold mb-3">Pipeline heatmap — asset class × stage</div>
      <table>
        <thead><tr><th>Asset</th>{stages.map(s=><th key={s} style={{fontSize:10}}>{s}</th>)}</tr></thead>
        <tbody>
          {assetClasses.map(a => (
            <tr key={a}>
              <td className="font-medium">{a}</td>
              {stages.map(s => <td key={s} className="text-center font-bold" style={cellStyle(matrix[a][s])}>{matrix[a][s] || ''}</td>)}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function GraphView({ deals, brokers }) {
  const nodes = [...brokers.map(b => ({ id:b.id, label:b.name, kind:'broker', size: deals.filter(d=>d.broker_id===b.id).length })),
                 ...deals.map(d => ({ id:d.id, label:d.deal_id || d.name.split(' ')[0], kind:'deal' }))];
  const N = nodes.length;
  const R = 220;
  return (
    <div className="panel p-5">
      <div className="font-semibold mb-3">Broker × deal graph</div>
      <svg width="100%" viewBox="-300 -260 600 520" style={{background:'#0e1533', borderRadius:12}}>
        {deals.map(d => {
          const b = brokers.findIndex(br => br.id === d.broker_id);
          const di = deals.indexOf(d);
          if (b === -1) return null;
          const ba = (b / Math.max(1, brokers.length)) * Math.PI * 2;
          const da = Math.PI + (di / Math.max(1, deals.length)) * Math.PI * 2;
          return <line key={d.id} x1={Math.cos(ba)*R*0.5} y1={Math.sin(ba)*R*0.5} x2={Math.cos(da)*R} y2={Math.sin(da)*R} stroke="#2a3576" strokeWidth="1"/>;
        })}
        {brokers.map((b,i) => {
          const a = (i / Math.max(1, brokers.length)) * Math.PI * 2;
          const x = Math.cos(a)*R*0.5, y = Math.sin(a)*R*0.5;
          return (<g key={b.id}><circle cx={x} cy={y} r="14" fill="#818cf8"/><text x={x} y={y-20} fill="#e7ecff" textAnchor="middle" fontSize="10">{b.name.split(' ')[0]}</text></g>);
        })}
        {deals.map((d,i) => {
          const a = Math.PI + (i / Math.max(1, deals.length)) * Math.PI * 2;
          const x = Math.cos(a)*R, y = Math.sin(a)*R;
          return (<g key={d.id}><circle cx={x} cy={y} r="10" fill="#6ee7b7"/><text x={x} y={y+22} fill="#e7ecff" textAnchor="middle" fontSize="10">{d.deal_id || d.name.slice(0,12)}</text></g>);
        })}
      </svg>
      <div className="text-xs text-slate-400 mt-2">Purple = brokers · green = deals · line = broker→deal link</div>
    </div>
  );
}

            <YAxis stroke="#8a94c2" fontSize={10}/>
            <Tooltip contentStyle={{background:'#121937',border:'1px solid #22306a',borderRadius:8}}/>
            <Bar dataKey="count" fill="#818cf8"/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div className="panel p-5">
        <div className="font-semibold mb-3">Broker scorecard — deals sourced</div>
        <table>
          <thead><tr><th>Broker</th><th>Deals</th><th>Docs complete</th><th>Conversion</th></tr></thead>
          <tbody>
            {brokerScore.map(b => (
              <tr key={b.name}>
                <td>{b.name}</td>
                <td>{b.deals}</td>
                <td>{b.complete}</td>
                <td>{b.deals ? Math.round(b.complete/b.deals*100)+'%' : '—'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function UnderwritingView({ deals, brokers }) {
  const ready = deals.filter(d => d.status === "docs complete");
  return (
    <div className="space-y-4">
      <div className="panel p-4">
        <div className="font-semibold mb-1">Underwriting Queue</div>
        <div className="text-xs text-slate-400">Deals with docs complete. Attach broker packet and assign to analyst.</div>
      </div>
      <div className="grid grid-cols-2 gap-4">
        {ready.map(d => {
          const b = brokers.find(br => br.id === d.broker_id);
          return (
            <div key={d.id} className="panel p-4">
              <div className="flex justify-between">
                <div>
                  <div className="font-semibold">{d.name}</div>
                  <div className="text-xs text-slate-500">{d.deal_id} · {b?.name || 'No broker'}</div>
                </div>
                <span className={`badge stage-done`}>docs complete</span>
              </div>
              <div className="grid grid-cols-3 gap-2 mt-3 text-sm">
                <div><div className="kpi-label">NOI</div><div>{fmt$(d.noi)}</div></div>
                <div><div className="kpi-label">Ask</div><div>{fmt$(d.ask_price)}</div></div>
                <div><div className="kpi-label">Cap</div><div>{fmtPct(d.cap_rate)}</div></div>
              </div>
              <div className="flex justify-end mt-3">
                <a className="btn text-xs" href={d.url} target="_blank" rel="noreferrer">Open in ClickUp ↗</a>
              </div>
            </div>
          );
        })}
        {ready.length === 0 && <div className="col-span-2 text-center text-slate-500 py-8">No deals ready for underwriting yet</div>}
      </div>
    </div>
  );
}

function AdminView({ meta, health }) {
  return (
    <div className="space-y-4">
      <div className="panel p-5">
        <div className="font-semibold mb-3">Backend health</div>
        <pre className="bg-slate-900 p-3 rounded text-xs">{JSON.stringify(health, null, 2)}</pre>
      </div>
      <div className="panel p-5">
        <div className="font-semibold mb-3">ClickUp wiring</div>
        <pre className="bg-slate-900 p-3 rounded text-xs">{JSON.stringify(meta, null, 2)}</pre>
      </div>
      <div className="panel p-5">
        <div className="font-semibold mb-3">About</div>
        <div className="text-sm text-slate-400 space-y-2">
          <div>BrokerFlow v3.0 — local web app. Data lives in ClickUp; dashboard is the UI.</div>
          <div>To change config: edit <code className="bg-slate-800 px-1 rounded">broker_flow.py</code> constants then restart.</div>
          <div>To add custom fields (real ClickUp UI): ClickUp → Space → Fields menu. Dashboard still works without them — it stores structured data in task description.</div>
        </div>
      </div>
    </div>
  );
}

// ---------- App ----------
function App() {
  const [ready, setReady] = useState(false);
  const [view, setView] = useState("dashboard");
  const [role, setRole] = useState("Director");
  const [meta, setMeta] = useState(null);
  const [health, setHealth] = useState(null);
  const [deals, setDeals] = useState([]);
  const [brokers, setBrokers] = useState([]);
  const [followups, setFollowups] = useState([]);
  const [refreshing, setRefreshing] = useState(false);
  const toast = useToast();

  const refresh = useCallback(async () => {
    setRefreshing(true);
    try {
      const [m, h, d, b, f] = await Promise.all([
        apiGet("/api/meta"), apiGet("/api/health"),
        apiGet("/api/deals"), apiGet("/api/brokers"), apiGet("/api/followups"),
      ]);
      setMeta(m); setHealth(h);
      setDeals(d.deals || []); setBrokers(b.brokers || []); setFollowups(f.followups || []);
    } catch(e) { toast.show("Refresh failed: "+e.message, "error"); }
    finally { setRefreshing(false); }
  }, []);

  useEffect(() => { if (ready) refresh(); }, [ready, refresh]);

  if (!ready) return <><SetupScreen onReady={()=>setReady(true)}/>{toast.ui}</>;
  if (!meta) return <div className="flex items-center justify-center h-screen"><span className="spinner"/></div>;

  const stages = meta.pipeline_stages;
  const assetClasses = meta.asset_classes;
  const regions = meta.regions;

  const handleCreateDeal = async (payload) => { await apiPost("/api/deals", payload); await refresh(); };
  const handleUpdateDeal = async (id, patch) => { await apiPut(`/api/deals/${id}`, patch); await refresh(); };
  const handleDeleteDeal = async (id) => { await apiDel(`/api/deals/${id}`); await refresh(); };
  const handleCreateBroker = async (payload) => { await apiPost("/api/brokers", payload); await refresh(); };
  const handleUpdateBroker = async (id, patch) => { await apiPut(`/api/brokers/${id}`, patch); await refresh(); };
  const handleSeed = async () => { await apiPost("/api/seed/sample-brokers", {}); await refresh(); };

  return (
    <>
      <Shell view={view} setView={setView} role={role} setRole={setRole} onRefresh={refresh} refreshing={refreshing}>
        {view === "dashboard" && <DashboardView deals={deals} brokers={brokers} followups={followups} role={role}/>}
        {view === "deals" && <DealsView deals={deals} brokers={brokers} stages={stages} assetClasses={assetClasses}
          onCreate={handleCreateDeal} onUpdate={handleUpdateDeal} onDelete={handleDeleteDeal} toast={toast}/>}
        {view === "brokers" && <BrokersView brokers={brokers} deals={deals} regions={regions} assetClasses={assetClasses}
          onCreate={handleCreateBroker} onUpdate={handleUpdateBroker} onSeed={handleSeed} toast={toast}/>}
        {view === "docchase" && <DocChaseView deals={deals} brokers={brokers} toast={toast}/>}
        {view === "intake" && <IntakeView deals={deals} onUpdate={handleUpdateDeal} toast={toast}/>}
        {view === "heatmap" && <HeatmapView deals={deals} stages={stages} assetClasses={assetClasses}/>}
        {view === "graph" && <GraphView deals={deals} brokers={brokers}/>}
        {view === "map" && <MapView deals={deals}/>}
        {view === "reports" && <ReportsView deals={deals} brokers={brokers} followups={followups}/>}
        {view === "underwriting" && <UnderwritingView deals={deals} brokers={brokers}/>}
        {view === "admin" && <AdminView meta={meta} health={health}/>}
      </Shell>
      {toast.ui}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
