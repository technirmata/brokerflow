name: JP BrokerFlow keepalive

# Pings the live Render service every 10 min so it never sleeps.
# Render free tier spins down after 15 min idle; waking from cold = 50s delay.
# This workflow hits /health (lightweight endpoint) and keeps the dyno hot.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:          # allow manual run

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          set -e
          URL="https://brokerflow-eyt8.onrender.com/health"
          echo "Pinging $URL"
          STATUS=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 60 "$URL")
          echo "HTTP $STATUS"
          cat /tmp/body
          echo
          if [ "$STATUS" != "200" ]; then
            echo "::error::Keepalive ping failed (HTTP $STATUS)"
            exit 1
          fi
